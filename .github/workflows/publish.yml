name: Publish (.NET 10)

on:
  push:
    tags:
      - 'v*'    # e.g., v1.2.3
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: orca
          - os: windows-latest
            rid: win-x64
            artifact: orca.exe
          - os: macos-latest
            rid: osx-x64
            artifact: orca

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: false

      - name: Clear NuGet caches
        run: dotnet nuget locals all --clear

      - name: Restore (locked-mode)
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish self-contained binary
        run: >
          dotnet publish src/Orca.Cli/Orca.Cli.fsproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          --output ./publish/${{ matrix.rid }}

      - name: Rename artifact (non-Windows)
        if: matrix.os != 'windows-latest'
        run: mv ./publish/${{ matrix.rid }}/orca ./publish/${{ matrix.rid }}/orca-${{ matrix.rid }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Rename-Item ./publish/${{ matrix.rid }}/orca.exe orca-${{ matrix.rid }}.exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/${{ matrix.rid }}/orca-${{ matrix.rid }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
